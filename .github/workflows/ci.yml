name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --extra dev

      - name: Lint (ruff check)
        working-directory: backend
        run: uv run ruff check .

      - name: Format check (ruff format)
        working-directory: backend
        run: uv run ruff format --check .

      - name: Type check (mypy)
        working-directory: backend
        run: uv run mypy src/

      - name: Tests (pytest)
        working-directory: backend
        run: uv run pytest --cov=nexuspkm --cov-report=term-missing

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (eslint)
        working-directory: frontend
        run: npm run lint

      - name: Type check (tsc)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Tests (vitest)
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npm run build
