name: AI Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run AI review
        run: python scripts/ai_review.py
        env:
          # AWS credentials for Bedrock — store as GitHub Actions secrets.
          # Prefer OIDC (aws-actions/configure-aws-credentials) over long-lived keys
          # when IAM permissions allow it.
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          # Non-sensitive: stored as a repo variable (Settings → Variables → Actions)
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          # Override the default model (us.anthropic.claude-sonnet-4-6) if needed
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
