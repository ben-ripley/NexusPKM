name: AI Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install anthropic SDK (Bedrock)
        run: pip install "anthropic[bedrock]"

      - name: Run AI review
        run: python scripts/ai_review.py
        env:
          # AWS credentials for Bedrock — store as GitHub Actions secrets.
          # Alternative: use OIDC (aws-actions/configure-aws-credentials) with an IAM role
          # that trusts the GitHub OIDC provider — avoids storing long-lived keys.
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          # Override the model if needed: us.anthropic.claude-sonnet-4-6-20251101-v1:0
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
